name: Secret Scan
on:
  pull_request:
  push:
    branches: [main]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for secrets
        run: |
          PATTERN='-----BEGIN [A-Z ]*PRIVATE KEY|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{50,}|sk-ant-[A-Za-z0-9_-]{30}|xox[baprs]-[0-9A-Za-z-]{10,}'
          if git grep -nIE "$PATTERN" -- . ':(exclude)*.example' ':(exclude).github/**' ':(exclude)**/*.md'; then
            echo "::error::Potential secret detected in tracked files."; exit 1
          fi
          if git ls-files | grep -iE '\.(p8|pem)$|id_rsa'; then
            echo "::error::Private-key file committed."; exit 1
          fi
          echo "No secrets detected."
