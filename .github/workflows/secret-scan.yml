name: Secret Scan
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Don't leave the checkout token persisted in .git/config — this job
          # only reads, so it never needs push credentials. (audit hardening)
          persist-credentials: false
      - name: Scan tracked files for secrets
        run: |
          # Content patterns: private keys, cloud/API tokens, AND service-account
          # / OAuth-client JSON signatures (a committed *-adminsdk-*.json or
          # client_secret_*.json would otherwise sail past). (audit hardening)
          PATTERN='-----BEGIN [A-Z ]*PRIVATE KEY|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{50,}|sk-ant-[A-Za-z0-9_-]{30}|xox[baprs]-[0-9A-Za-z-]{10,}|"type": *"service_account"|"private_key_id"|"client_secret"'
          # Scan .github/** too (a token pasted into a workflow file was previously
          # missed) — but exclude THIS file, whose pattern literals would otherwise
          # match themselves. (audit hardening)
          # NOTE: `-e "$PATTERN"` is REQUIRED — the pattern starts with
          # "-----BEGIN", and without -e git grep parses that leading dash as an
          # option and errors (exit 129), which the `if` reads as "no match" — so
          # the content scan silently passed without scanning. (audit fix)
          if git grep -nIE -e "$PATTERN" -- . ':(exclude)*.example' ':(exclude).github/workflows/secret-scan.yml' ':(exclude)**/*.md'; then
            echo "::error::Potential secret detected in tracked files."; exit 1
          fi
          # Filename guards: private-key files + service-account / Firebase
          # admin-SDK JSON key files. (audit hardening)
          if git ls-files | grep -iE '\.(p8|pem)$|id_rsa|serviceaccount.*\.json|-adminsdk-.*\.json'; then
            echo "::error::Private-key / service-account file committed."; exit 1
          fi
          echo "No secrets detected."
